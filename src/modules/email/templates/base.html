<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8" />
	<title>{{title}}</title>
	<style>
		body { background: #f4f6f8; font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 0; }
		.container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 8px; padding: 40px; }
		.footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #ddd; font-size: 12px; color: #666; text-align: center; }
		.logo { padding-bottom: 30px; }
	</style>
</head>
<body>
	<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f6f8;padding:40px 0;">
		<tr>
			<td align="center">
				<table width="600" cellpadding="0" cellspacing="0" class="container">
					<tr>
						<td align="center" class="logo">
							<img src="https://tekreminnovations.com/logo.svg" alt="Tekrem Innovations" width="150" style="display:block;" />
						</td>
					</tr>
					<tr>
						<td>
							{{{body}}}
						</td>
					</tr>
					<tr>
						<td class="footer">
							<p>Thank you for using our service!</p>
							<p>Tekrem Innovations &copy; {{year}}</p>
						</td>
					</tr>
				</table>
			</td>
		</tr>
	</table>
</body>
</html>
